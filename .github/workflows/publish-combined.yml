name: Publish combined image

# Builds the combined image (Go bridge + Python MCP server + mcp-auth-wrapper)
# from Dockerfile.combined and pushes it to GHCR. Intended for running the
# WhatsApp MCP behind mcp-auth-wrapper (one per-user stdio server per user).

on:
  push:
    branches:
      - main
      - homelab-per-user-onboarding
    tags:
      - 'v*'
    paths:
      - 'whatsapp-bridge/**'
      - 'whatsapp-mcp-server/**'
      - 'Dockerfile.combined'
      - 'entrypoint-combined.sh'
      - '.github/workflows/publish-combined.yml'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/whatsapp-mcp-extended
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.combined
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
